<div class="flex min-h-screen flex-col bg-bg-canvas">
  <header
    class="flex items-center justify-between px-4 py-4 sm:px-6"
    data-testid="layout-shell-header"
  >
    <a
      routerLink="/"
      class="text-sm font-semibold tracking-wide text-text-primary"
      data-testid="layout-shell-logo-link"
    >
      RentityX
    </a>

    <div class="flex items-center gap-3">
      @if (isAuthenticated() && !isRestoringSession()) {
        <a
          routerLink="/account"
          class="text-sm font-medium text-text-secondary hover:text-text-primary"
          data-testid="layout-shell-account-link"
        >
          Minha conta
        </a>
        <button
          type="button"
          (click)="logout()"
          class="text-sm font-medium text-text-secondary hover:text-text-primary"
          data-testid="layout-shell-logout-button"
        >
          Sair
        </button>
      } @else {
        <a
          routerLink="/login"
          class="text-sm font-medium text-text-secondary hover:text-text-primary"
          data-testid="layout-shell-login-link"
        >
          Entrar
        </a>
        <a
          routerLink="/register"
          class="text-sm font-medium text-text-secondary hover:text-text-primary"
          data-testid="layout-shell-register-link"
        >
          Criar conta
        </a>
      }

      <button
        type="button"
        (click)="themeService.toggle()"
        class="rounded-md border border-border-default bg-bg-surface px-3 py-1.5 text-sm text-text-secondary hover:bg-bg-canvas"
        data-testid="layout-shell-theme-toggle-button"
      >
        {{ themeService.isDark() ? 'Modo claro' : 'Modo escuro' }}
      </button>
    </div>
  </header>

  <div class="flex-1">
    <ng-content />
  </div>

  <footer
    class="border-t border-border-default px-4 py-6 text-center text-sm text-text-muted sm:px-6"
    data-testid="layout-shell-footer"
  >
    <span data-testid="layout-shell-footer-copyright">© RentityX {{ currentYear }}</span>
    <span class="mx-2">·</span>
    <span data-testid="layout-shell-footer-terms">Termos</span>
    <span class="mx-2">·</span>
    <span data-testid="layout-shell-footer-privacy">Privacidade</span>
  </footer>
</div>
